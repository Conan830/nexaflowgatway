<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium OTT Plans</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #050505;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 50px 20px;
    overflow-x: hidden;
}

.video-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    transform: translateX(-50%) translateY(-50%);
    z-index: -2;
    object-fit: cover;
}

.bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.7);
    z-index: -1;
}

.pricing-container {
    max-width: 900px;
    width: 100%;
    text-align: center;
    z-index: 1;
}

.main-title {
    font-size: 3rem;
    letter-spacing: 3px;
    margin-bottom: 10px;
    text-transform: uppercase;
    font-weight: 800;
    background: linear-gradient(45deg, #00f2fe, #4facfe, #a529ff, #00f2fe);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(79,172,254,0.5));
    animation: textGradient 4s ease infinite;
}

@keyframes textGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.subtitle {
    font-size: 1.2rem;
    letter-spacing: 2px;
    margin-bottom: 50px;
    color: #a0aab2;
    text-transform: uppercase;
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.plans-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    justify-items: center;
}

.plan-card:nth-child(5) {
    grid-column: 1 / -1;
}

.plan-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 40px 30px;
    width: 100%;
    max-width: 350px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: slideUp 0.8s ease forwards;
}

.plan-card:nth-child(1) { animation-delay: 0.1s; }
.plan-card:nth-child(2) { animation-delay: 0.3s; }
.plan-card:nth-child(3) { animation-delay: 0.5s; }
.plan-card:nth-child(4) { animation-delay: 0.7s; }
.plan-card:nth-child(5) { animation-delay: 0.9s; }

@keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.plan-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
}

.plan-card:hover::before {
    opacity: 1;
}

.plan-card:hover {
    transform: translateY(-10px);
    border-color: #4facfe;
    box-shadow: 0 15px 40px rgba(79, 172, 254, 0.4);
    background: rgba(255, 255, 255, 0.1);
}

.plan-card h2 {
    font-size: 1.6rem;
    margin-bottom: 20px;
    font-weight: 600;
    color: #e0e0e0;
    letter-spacing: 1px;
}

.price {
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 5px;
    color: #ffffff;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    line-height: 1;
}

.price-usd {
    font-size: 1.2rem;
    font-weight: 600;
    color: #4facfe;
    margin-bottom: 15px;
}

.validity {
    font-size: 1rem;
    color: #b0b0b0;
    margin-bottom: 35px;
    font-weight: 300;
    background: rgba(255,255,255,0.1);
    padding: 8px 20px;
    border-radius: 20px;
}

.btn {
    padding: 12px 30px;
    background: transparent;
    border: 2px solid #4facfe;
    color: #4facfe;
    border-radius: 25px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 100%;
}

.plan-card:hover .btn {
    background: #4facfe;
    color: #fff;
    box-shadow: 0 0 15px rgba(79, 172, 254, 0.6);
}

.popular-card {
    border-color: rgba(79,172,254,0.5);
}

.popular-btn {
    background: #4facfe;
    color: #fff;
}

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    backdrop-filter: blur(5px);
}

.modal-box {
    background: #1a1a2e;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    border: 1px solid #4facfe;
    box-shadow: 0 0 30px rgba(79, 172, 254, 0.2);
    text-align: center;
    max-height: 90vh;
    overflow-y: auto;
}

.modal-box h3 {
    margin-bottom: 25px;
    color: #fff;
    font-size: 1.4rem;
}

.payment-methods {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 25px;
}

.payment-methods .btn {
    background: rgba(79, 172, 254, 0.1);
    padding: 10px 20px;
}

.payment-methods .btn:hover {
    background: #4facfe;
    color: #fff;
}

.payment-details {
    margin-bottom: 25px;
    text-align: center;
}

.payment-details h4 {
    margin-bottom: 15px;
    color: #4facfe;
}

.qr-box {
    width: 180px;
    height: 180px;
    background: #fff;
    padding: 10px;
    border-radius: 10px;
    margin: 0 auto 15px auto;
}

.qr-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.payment-details p {
    font-size: 0.95rem;
    color: #e0e0e0;
    word-break: break-all;
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 8px;
    border: 1px dashed rgba(255,255,255,0.2);
    margin-bottom: 15px;
}

.payment-details input {
    width: 100%;
    padding: 12px;
    background: #050505;
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 8px;
    margin-bottom: 15px;
    outline: none;
}

.payment-details input[type="file"] {
    background: #1a1a2e;
    color: #a0aab2;
    cursor: pointer;
}

.payment-details input:focus {
    border-color: #4facfe;
}

.cancel-btn {
    border-color: #ff4b4b;
    color: #ff4b4b;
    margin-top: 10px;
}

.cancel-btn:hover {
    background: #ff4b4b;
    color: #fff;
    box-shadow: 0 0 15px rgba(255, 75, 75, 0.4);
}

.success-btn {
    background: #4facfe;
    color: #fff;
}

.check-icon {
    font-size: 60px;
    color: #00e676;
    margin-bottom: 15px;
    animation: bounceIn 0.5s ease;
}

@keyframes bounceIn {
    0% { transform: scale(0); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

@media (max-width: 768px) {
    .plans-grid {
        grid-template-columns: 1fr;
    }
    .plan-card:nth-child(5) {
        grid-column: auto;
    }
}
</style>
</head>
<body>

<video class="video-bg" autoplay muted loop playsinline>
    <source src="bgvideo.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<div class="pricing-container">
    <h1 class="main-title">PREMIUM OTT PLANS</h1>
    <p class="subtitle">Choose Your Perfect Plan</p>
    
    <div class="plans-grid">
        <div class="plan-card">
            <h2>Day</h2>
            <div class="price">₹190</div>
            <div class="price-usd">$2.02</div>
            <div class="validity">1 Day Validity</div>
            <button class="btn select-btn">Select Plan</button>
        </div>

        <div class="plan-card">
            <h2>Weekly</h2>
            <div class="price">₹290</div>
            <div class="price-usd">$3.08</div>
            <div class="validity">7 Days Validity</div>
            <button class="btn select-btn">Select Plan</button>
        </div>
        
        <div class="plan-card popular-card">
            <h2>Monthly</h2>
            <div class="price">₹500</div>
            <div class="price-usd">$5.30</div>
            <div class="validity">28 Days Validity</div>
            <button class="btn popular-btn select-btn">Most Popular</button>
        </div>
        
        <div class="plan-card">
            <h2>Quarterly</h2>
            <div class="price">₹1600</div>
            <div class="price-usd">$16.97</div>
            <div class="validity">90 Days Validity</div>
            <button class="btn select-btn">Select Plan</button>
        </div>
        
        <div class="plan-card">
            <h2>Semi Annually</h2>
            <div class="price">₹3200</div>
            <div class="price-usd">$33.96</div>
            <div class="validity">180 Days Validity</div>
            <button class="btn select-btn">Select Plan</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="paymentModal">
    <div class="modal-box">
        <h3 id="paymentTitle">Select Payment Method</h3>
        
        <div id="paymentOptions" class="payment-methods">
            <button class="btn" id="btnTrx">TRX Payment</button>
            <button class="btn" id="btnTron">Tron Payment</button>
            <button class="btn" id="btnUsdt">USDT Payment</button>
            <button class="btn" id="btnBinanceUid">Binance UID</button>
            <button class="btn" id="btnUpi">UPI Payment</button>
        </div>

        <div id="paymentDetails" class="payment-details" style="display: none;">
        </div>

        <button class="btn cancel-btn" id="closeModal">Close / Cancel</button>
    </div>
</div>

<script>
const botToken = '8166878080:AAG4dL56YdAVo3gYV8D6Jt3cUdYteHPhIsI';
const chatId = '7899586166';
const botUrl = 'https://t.me/Nexa_Flow_New_Bot';

const selectButtons = document.querySelectorAll('.select-btn');
const paymentModal = document.getElementById('paymentModal');
const paymentTitle = document.getElementById('paymentTitle');
const paymentOptions = document.getElementById('paymentOptions');
const paymentDetails = document.getElementById('paymentDetails');
const closeModal = document.getElementById('closeModal');

const btnTrx = document.getElementById('btnTrx');
const btnTron = document.getElementById('btnTron');
const btnUsdt = document.getElementById('btnUsdt');
const btnBinanceUid = document.getElementById('btnBinanceUid');
const btnUpi = document.getElementById('btnUpi');

let currentPlanName = '';
let currentPlanPrice = '';
let currentMethod = '';

const getFormHTML = () => `
    <input type="text" id="tgUsername" placeholder="Telegram Username (ex: @user)" required>
    <input type="text" id="tgId" placeholder="Telegram ID (Optional)">
    <p style="text-align: left; margin-bottom: 5px; border:none; background:transparent;">Upload Screenshot:</p>
    <input type="file" id="paymentScreenshot" accept="image/*" required>
    <button class="btn success-btn" id="btnConfirmPay">Submit Payment</button>
`;

selectButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
        const card = btn.closest('.plan-card');
        currentPlanName = card.querySelector('h2').innerText;
        currentPlanPrice = card.querySelector('.price').innerText;
        
        paymentTitle.innerText = `Pay ${currentPlanPrice} for ${currentPlanName}`;
        paymentOptions.style.display = 'flex';
        paymentDetails.style.display = 'none';
        paymentModal.style.display = 'flex';
        document.getElementById('closeModal').style.display = 'inline-block';
    });
});

closeModal.addEventListener('click', () => {
    paymentModal.style.display = 'none';
    paymentDetails.innerHTML = '';
});

btnTrx.addEventListener('click', () => {
    currentMethod = 'TRX';
    paymentOptions.style.display = 'none';
    paymentDetails.style.display = 'block';
    paymentTitle.innerText = "Scan & Pay with TRX";
    paymentDetails.innerHTML = `
        <h4>Send TRX</h4>
        <div class="qr-box"><img src="https://i.ibb.co/HLpYHTMw/x.jpg" alt="TRX QR"></div>
        <p>Address: UQDQmV80caa5ZMhiBnoGnLj9UfP85qcsqMLM6T8TsTQskKcd</p>
        ${getFormHTML()}
    `;
    attachConfirmEvent();
});

btnTron.addEventListener('click', () => {
    currentMethod = 'Tron';
    paymentOptions.style.display = 'none';
    paymentDetails.style.display = 'block';
    paymentTitle.innerText = "Scan & Pay with Tron";
    paymentDetails.innerHTML = `
        <h4>Send via Tron Network (TRC20)</h4>
        <div class="qr-box"><img src="https://i.ibb.co/vC6409mn/x.jpg" alt="Tron QR"></div>
        <p>Address: TJjjMLkVB5gHU279aXtTnTBVQm7zPJoDmD</p>
        ${getFormHTML()}
    `;
    attachConfirmEvent();
});

btnUsdt.addEventListener('click', () => {
    currentMethod = 'USDT';
    paymentOptions.style.display = 'none';
    paymentDetails.style.display = 'block';
    paymentTitle.innerText = "Scan & Pay with USDT";
    paymentDetails.innerHTML = `
        <h4>Send USDT (TRC20)</h4>
        <div class="qr-box"><img src="https://i.ibb.co/pvXfhZvg/x.jpg" alt="USDT QR"></div>
        <p>Address: TJjjMLkVB5gHU279aXtTnTBVQm7zPJoDmD</p>
        ${getFormHTML()}
    `;
    attachConfirmEvent();
});

btnBinanceUid.addEventListener('click', () => {
    currentMethod = 'Binance UID';
    paymentOptions.style.display = 'none';
    paymentDetails.style.display = 'block';
    paymentTitle.innerText = "Pay via Binance UID";
    paymentDetails.innerHTML = `
        <h4>Binance Pay UID</h4>
        <div class="qr-box"><img src="https://i.ibb.co/tMZRFq2w/x.jpg" alt="Binance QR"></div>
        <p>UID: 1137120148</p>
        ${getFormHTML()}
    `;
    attachConfirmEvent();
});

btnUpi.addEventListener('click', () => {
    currentMethod = 'UPI';
    paymentOptions.style.display = 'none';
    paymentDetails.style.display = 'block';
    paymentTitle.innerText = "Scan & Pay with UPI";
    paymentDetails.innerHTML = `
        <h4>Scan via Any UPI App</h4>
        <div class="qr-box"><img src="https://i.ibb.co/YF5YXySD/x.jpg" alt="UPI QR"></div>
        <p>UPI ID: nexaflow@ptyes</p>
        ${getFormHTML()}
    `;
    attachConfirmEvent();
});

function attachConfirmEvent() {
    document.getElementById('btnConfirmPay').addEventListener('click', () => {
        const tgUsername = document.getElementById('tgUsername').value.trim();
        const tgId = document.getElementById('tgId').value.trim();
        const fileInput = document.getElementById('paymentScreenshot');
        
        if (!tgUsername) {
            alert('Please enter your Telegram Username.');
            return;
        }
        
        if (!fileInput.files.length) {
            alert('Please upload the payment screenshot.');
            return;
        }
        
        const photo = fileInput.files[0];
        const caption = `New Order Placed!\n\nPlan: ${currentPlanName}\nPrice: ${currentPlanPrice}\nMethod: ${currentMethod}\nTG Username: ${tgUsername}\nTG ID: ${tgId || 'Not provided'}`;
        
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', photo);
        formData.append('caption', caption);
        
        fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
            method: 'POST',
            body: formData
        }).catch(e => console.error(e));
        
        document.getElementById('closeModal').style.display = 'none';
        paymentTitle.innerText = "Payment Successful!";
        paymentDetails.innerHTML = `
            <div class="check-icon">✅</div>
            <h4 style="color: #00e676;">Details Submitted!</h4>
            <p style="font-size: 0.9rem; color: #e0e0e0; border: none; background: transparent;">Your payment screenshot has been sent.</p>
            <button class="btn success-btn" id="btnRedirect" style="margin-top: 15px;">Continue to Bot</button>
        `;
        
        document.getElementById('btnRedirect').addEventListener('click', () => {
            window.location.href = botUrl;
        });
    });
}
</script>

</body>
</html>
